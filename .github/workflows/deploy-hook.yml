name: Trigger Builder Weekly rebuild

on:
  push:
    branches:
      - main

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Fire Vercel deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret not set, skipping rebuild"
            exit 0
          fi
          curl -X POST "$DEPLOY_HOOK_URL"
